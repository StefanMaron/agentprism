name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write  # required for trusted publishing (no API token needed)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          echo "Building version $VERSION"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi  # requires a "pypi" environment configured in repo settings
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no PYPI_API_TOKEN secret needed.
        # Set up at: https://pypi.org/manage/account/publishing/
        # Project: agentprism, Owner: StefanMaron, Repo: agentprism,
        # Workflow: publish.yml, Environment: pypi
