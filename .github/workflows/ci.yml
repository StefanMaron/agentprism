name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Import smoke test
        run: |
          python -c "from agentprism.session import SessionRegistry, PROVIDERS; assert set(PROVIDERS) == {'copilot','claude','codex'}"

      - name: Tests
        run: pytest --tb=short -q
        continue-on-error: true  # no real tests yet — remove once test suite exists
